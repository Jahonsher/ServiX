<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imperial Restoran</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:    #c9a84c;
      --gold2:   #e8c97e;
      --dark:    #0d0a07;
      --dark2:   #15110c;
      --dark3:   #1e1710;
      --card:    #1a1410;
      --border:  rgba(201,168,76,0.2);
      --text:    #f0e6d0;
      --muted:   #8a7a65;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content:'';
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
    }

    /* ====== SCROLLBAR ====== */
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius:2px; }

    /* ====== TYPOGRAPHY ====== */
    .font-display { font-family: 'Playfair Display', serif; }
    .font-serif   { font-family: 'Cormorant Garamond', serif; }

    /* ====== GOLD DIVIDER ====== */
    .gold-line {
      display:flex; align-items:center; gap:12px; justify-content:center;
      margin: 8px 0;
    }
    .gold-line::before, .gold-line::after {
      content:''; flex:1; max-width:60px; height:1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }
    .gold-line::after { background: linear-gradient(90deg, var(--gold), transparent); }
    .gold-line span { color:var(--gold); font-size:14px; }

    /* ====== HERO ====== */
    .hero {
      min-height: 42vh;
      background:
        linear-gradient(to bottom, rgba(13,10,7,0) 0%, rgba(13,10,7,0.7) 60%, var(--dark) 100%),
        url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1400&q=80') center/cover no-repeat;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding: 48px 20px 36px;
      text-align:center; position:relative;
    }
    .hero-badge {
      font-family:'Cormorant Garamond',serif;
      font-size:11px; letter-spacing:4px; text-transform:uppercase;
      color:var(--gold); margin-bottom:12px;
      border: 1px solid var(--border); padding:4px 16px; border-radius:2px;
    }
    .hero h1 {
      font-family:'Playfair Display',serif;
      font-size:clamp(32px, 8vw, 52px);
      font-weight:700; line-height:1.15;
      background: linear-gradient(135deg, #e8c97e 0%, #c9a84c 50%, #a07830 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .hero p {
      font-family:'Cormorant Garamond',serif;
      font-size:18px; color:rgba(240,230,208,0.7);
      margin-top:8px; letter-spacing:1px;
    }

    /* ====== NAV ====== */
    .topbar {
      position:sticky; top:0; z-index:40;
      background: rgba(13,10,7,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      padding: 12px 20px;
    }
    .topbar-logo {
      font-family:'Playfair Display',serif;
      font-size:18px; color:var(--gold); font-weight:600;
    }
    .topbar-actions { display:flex; gap:8px; }
    .icon-btn {
      background: rgba(201,168,76,0.08);
      border: 1px solid var(--border);
      color: var(--gold2);
      width:40px; height:40px; border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:18px; transition:all .2s;
      position:relative;
    }
    .icon-btn:hover { background:rgba(201,168,76,0.18); }
    .badge {
      position:absolute; top:-6px; right:-6px;
      background:var(--gold); color:var(--dark);
      font-size:10px; font-weight:700; font-family:'Jost',sans-serif;
      width:18px; height:18px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
    }

    /* ====== SECTION TITLE ====== */
    .section-title {
      text-align:center; padding:36px 20px 8px;
    }
    .section-title .sub {
      font-family:'Cormorant Garamond',serif;
      font-size:13px; letter-spacing:4px; text-transform:uppercase;
      color:var(--gold); display:block; margin-bottom:6px;
    }
    .section-title h2 {
      font-family:'Playfair Display',serif;
      font-size:clamp(24px,6vw,34px); font-weight:600;
      color:var(--text);
    }

    /* ====== FILTER TABS ====== */
    .filter-tabs {
      display:flex; gap:8px; justify-content:center;
      padding: 16px 20px; flex-wrap:wrap;
    }
    .tab-btn {
      font-family:'Jost',sans-serif; font-size:12px;
      letter-spacing:2px; text-transform:uppercase;
      padding:7px 20px; border-radius:2px; cursor:pointer;
      border: 1px solid var(--border);
      color:var(--muted); background:transparent;
      transition:all .25s;
    }
    .tab-btn.active, .tab-btn:hover {
      background: var(--gold);
      color: var(--dark);
      border-color: var(--gold);
      font-weight:500;
    }

    /* ====== PRODUCT GRID ====== */
    .product-grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap:16px; padding:8px 16px 32px;
    }
    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius:8px; overflow:hidden;
      transition: transform .25s, box-shadow .25s;
      cursor:pointer;
    }
    .product-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(201,168,76,0.15);
    }
    .product-card img {
      width:100%; height:140px; object-fit:cover;
      display:block;
    }
    .product-card .img-placeholder {
      width:100%; height:140px;
      background: linear-gradient(135deg, var(--dark3), var(--dark2));
      display:flex; align-items:center; justify-content:center;
      font-size:36px;
    }
    .product-info { padding:12px; }
    .product-info h3 {
      font-family:'Playfair Display',serif;
      font-size:15px; font-weight:600; color:var(--text);
      margin-bottom:2px;
    }
    .product-info .cat {
      font-size:10px; letter-spacing:2px; text-transform:uppercase;
      color:var(--muted); margin-bottom:8px;
    }
    .product-info .price {
      font-family:'Cormorant Garamond',serif;
      font-size:17px; color:var(--gold);
      display:block; margin-bottom:10px;
    }
    .add-btn {
      width:100%; padding:8px;
      background: linear-gradient(135deg, #c9a84c, #a07830);
      color:var(--dark); font-family:'Jost',sans-serif;
      font-size:11px; font-weight:500; letter-spacing:2px;
      text-transform:uppercase; border:none; border-radius:4px;
      cursor:pointer; transition:opacity .2s;
    }
    .add-btn:hover { opacity:0.85; }

    /* ====== PANEL (slide-in) ====== */
    .panel {
      position:fixed; top:0; right:0;
      height:100%; width:min(340px, 100vw);
      background: var(--dark2);
      border-left: 1px solid var(--border);
      z-index:50; transform:translateX(100%);
      transition:transform .3s cubic-bezier(.4,0,.2,1);
      overflow-y:auto; display:flex; flex-direction:column;
    }
    .panel.open { transform:translateX(0); }
    .panel-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:20px; border-bottom:1px solid var(--border);
      position:sticky; top:0; background:var(--dark2); z-index:2;
    }
    .panel-header h2 {
      font-family:'Playfair Display',serif;
      font-size:20px; color:var(--gold);
    }
    .close-btn {
      background:transparent; border:1px solid var(--border);
      color:var(--muted); width:32px; height:32px;
      border-radius:6px; cursor:pointer; font-size:16px;
      display:flex; align-items:center; justify-content:center;
      transition:all .2s;
    }
    .close-btn:hover { color:var(--text); border-color:var(--gold); }

    /* ====== CART ITEM ====== */
    .cart-item {
      display:flex; justify-content:space-between; align-items:center;
      padding:14px 20px; border-bottom:1px solid rgba(201,168,76,0.08);
    }
    .cart-item-name { font-size:14px; color:var(--text); margin-bottom:2px; }
    .cart-item-price { font-family:'Cormorant Garamond',serif; font-size:15px; color:var(--gold); }
    .qty-controls { display:flex; align-items:center; gap:8px; }
    .qty-btn {
      width:28px; height:28px; border-radius:6px;
      border:1px solid var(--border);
      background:rgba(201,168,76,0.08);
      color:var(--gold2); font-size:16px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:all .15s;
    }
    .qty-btn:hover { background:rgba(201,168,76,0.2); }
    .qty-num { font-size:14px; font-weight:500; min-width:20px; text-align:center; }

    /* ====== CART FOOTER ====== */
    .cart-footer {
      margin-top:auto; padding:20px;
      border-top:1px solid var(--border);
      position:sticky; bottom:0; background:var(--dark2);
    }
    .cart-total-row {
      display:flex; justify-content:space-between;
      font-family:'Cormorant Garamond',serif;
      font-size:20px; margin-bottom:14px;
    }
    .cart-total-row span:last-child { color:var(--gold); font-weight:500; }
    .checkout-btn {
      width:100%; padding:14px;
      background: linear-gradient(135deg, #c9a84c 0%, #a07830 100%);
      color:var(--dark); font-family:'Jost',sans-serif;
      font-weight:500; font-size:12px; letter-spacing:3px;
      text-transform:uppercase; border:none; border-radius:4px;
      cursor:pointer; transition:opacity .2s;
    }
    .checkout-btn:hover { opacity:0.85; }
    .checkout-btn:disabled { opacity:0.5; cursor:not-allowed; }

    /* ====== PROFILE CARD ====== */
    .profile-card {
      margin:20px; padding:20px;
      background: var(--card); border:1px solid var(--border);
      border-radius:8px;
    }
    .profile-avatar {
      width:56px; height:56px; border-radius:50%;
      background: linear-gradient(135deg, var(--gold), #a07830);
      display:flex; align-items:center; justify-content:center;
      font-size:24px; margin-bottom:14px;
    }
    .profile-name {
      font-family:'Playfair Display',serif;
      font-size:18px; color:var(--text); margin-bottom:4px;
    }
    .profile-username { font-size:13px; color:var(--muted); margin-bottom:6px; }
    .profile-phone { font-size:13px; color:var(--gold2); }

    /* ====== ORDER CARD ====== */
    .order-card {
      margin:0 20px 12px;
      padding:16px;
      background: var(--card); border:1px solid var(--border);
      border-radius:8px;
    }
    .order-items { font-size:13px; color:var(--text); margin-bottom:6px; line-height:1.5; }
    .order-total {
      font-family:'Cormorant Garamond',serif;
      font-size:18px; color:var(--gold); margin-bottom:4px;
    }
    .order-status {
      display:inline-block; font-size:10px; letter-spacing:2px;
      text-transform:uppercase; padding:3px 10px;
      border:1px solid var(--gold); color:var(--gold);
      border-radius:2px; margin-bottom:4px;
    }
    .order-date { font-size:11px; color:var(--muted); }

    /* ====== OVERLAY ====== */
    #overlay {
      position:fixed; inset:0; z-index:45;
      background:rgba(0,0,0,0.7); backdrop-filter:blur(2px);
      display:none;
    }
    #overlay.show { display:block; }

    /* ====== EMPTY STATE ====== */
    .empty-state {
      text-align:center; padding:48px 20px;
      color:var(--muted);
    }
    .empty-state .icon { font-size:40px; margin-bottom:12px; }
    .empty-state p { font-family:'Cormorant Garamond',serif; font-size:16px; }

    /* ====== FOOTER ====== */
    footer {
      text-align:center; padding:32px 20px;
      border-top:1px solid var(--border);
      font-family:'Cormorant Garamond',serif;
      font-size:13px; color:var(--muted);
      letter-spacing:1px;
    }
    footer span { color:var(--gold); }

    /* ====== ANIMATIONS ====== */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .product-card { animation: fadeUp .4s ease both; }
  </style>
</head>
<body>

<!-- ===== TOPBAR ===== -->
<nav class="topbar">
  <div class="topbar-logo">✦ Imperial</div>
  <div class="topbar-actions">
    <button class="icon-btn" onclick="openUserPanel()" title="Profil">
      👤
    </button>
    <button class="icon-btn" onclick="toggleCart()" title="Savatcha">
      🛒
      <span class="badge" id="cartCount">0</span>
    </button>
  </div>
</nav>

<!-- ===== HERO ===== -->
<header class="hero">
  <div class="hero-badge">Toshkent, O'zbekiston</div>
  <h1>Imperial Restoran</h1>
  <p>Eng yaxshi ta'm — eng yaxshi xizmat</p>
  <div class="gold-line" style="margin-top:18px; max-width:200px; margin-left:auto; margin-right:auto;">
    <span>✦</span>
  </div>
  <button onclick="scrollToMenu()"
    style="margin-top:18px; padding:10px 28px; background:transparent;
           border:1px solid var(--gold); color:var(--gold);
           font-family:'Jost',sans-serif; font-size:11px; letter-spacing:3px;
           text-transform:uppercase; border-radius:2px; cursor:pointer;
           transition:all .2s;"
    onmouseover="this.style.background='var(--gold)'; this.style.color='var(--dark)'"
    onmouseout="this.style.background='transparent'; this.style.color='var(--gold)'">
    Menuni Ko'rish
  </button>
</header>

<!-- ===== MENU SECTION ===== -->
<section id="menu">
  <div class="section-title">
    <span class="sub">Bizning taomlar</span>
    <h2>Menyu</h2>
    <div class="gold-line"><span>✦</span></div>
  </div>

  <!-- Filter tabs -->
  <div class="filter-tabs">
    <button class="tab-btn active" onclick="filterCategory('all', this)">Barchasi</button>
    <button class="tab-btn" onclick="filterCategory('Taom', this)">Taomlar</button>
    <button class="tab-btn" onclick="filterCategory('Ichimlik', this)">Ichimliklar</button>
  </div>

  <!-- Products -->
  <div class="product-grid" id="products">
    <div class="empty-state" style="grid-column:1/-1">
      <div class="icon">🍽</div>
      <p>Yuklanmoqda...</p>
    </div>
  </div>
</section>

<!-- ===== FOOTER ===== -->
<footer>
  © 2026 <span>Imperial Restoran</span> — Barcha huquqlar himoyalangan
</footer>

<!-- ===== OVERLAY ===== -->
<div id="overlay" onclick="closePanels()"></div>

<!-- ===== CART PANEL ===== -->
<div class="panel" id="cartPanel">
  <div class="panel-header">
    <h2>Savatcha</h2>
    <button class="close-btn" onclick="closePanels()">✕</button>
  </div>

  <div id="cartItems" style="flex:1">
    <div class="empty-state">
      <div class="icon">🛒</div>
      <p>Savatcha bo'sh</p>
    </div>
  </div>

  <div class="cart-footer">
    <div class="cart-total-row">
      <span>Jami:</span>
      <span><span id="cartTotal">0</span> so'm</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">
      Buyurtma Berish
    </button>
  </div>
</div>

<!-- ===== USER PANEL ===== -->
<div class="panel" id="userPanel">
  <div class="panel-header">
    <h2>Profilim</h2>
    <button class="close-btn" onclick="closePanels()">✕</button>
  </div>

  <!-- Profile card -->
  <div class="profile-card">
    <div class="profile-avatar">👤</div>
    <div class="profile-name" id="profileName">Yuklanmoqda...</div>
    <div class="profile-username" id="profileUsername"></div>
    <div class="profile-phone" id="profilePhone"></div>
  </div>

  <!-- Orders title -->
  <div style="padding:16px 20px 8px; display:flex; align-items:center; gap:8px;">
    <span style="font-family:'Playfair Display',serif; font-size:16px; color:var(--text)">Buyurtmalarim</span>
    <div style="flex:1; height:1px; background:var(--border)"></div>
  </div>

  <div id="userOrders">
    <div class="empty-state">
      <div class="icon">📋</div>
      <p>Yuklanmoqda...</p>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
