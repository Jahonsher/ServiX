<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Restoran</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg:     '#0d0d0d',
        bg2:    '#161616',
        bg3:    '#1e1e1e',
        card:   '#181818',
        accent: '#ff6b35',
        gold:   '#f5a623',
      },
      fontFamily: { sans: ['Nunito','sans-serif'] }
    }
  }
}
</script>
<!-- CONFIG: Har Vercel deployment uchun shu 2 qiymatni o'zgartiring -->
<script>
window.__CONFIG__ = {
  API_URL:       "https://e-comerce-bot-main-production.up.railway.app",
  RESTAURANT_ID: "imperial"
};
</script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:#0d0d0d;color:#f0f0f0;font-family:'Nunito',sans-serif;overscroll-behavior:none}
  ::-webkit-scrollbar{width:3px;height:3px}
  ::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
  .scrollbar-hide::-webkit-scrollbar{display:none}
  .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
  @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes toastIn{from{transform:translateX(110%)}to{transform:translateX(0)}}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
  .slide-up{animation:slideUp .3s cubic-bezier(.16,1,.3,1)}
  .fade-in{animation:fadeIn .25s ease forwards}
  .badge-pulse{animation:pulse .25s ease}
  .tab-active{background:#ff6b35!important;color:#fff!important}
  .press:active{transform:scale(.95);transition:transform .1s}
</style>
</head>
<body class="min-h-screen">

<!-- BLOCKED -->
<div id="blockedScreen" class="hidden fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-6">
  <div class="text-center max-w-xs">
    <div class="text-6xl mb-4">🔒</div>
    <p class="text-xl font-black text-white mb-2">Vaqtincha yopiq</p>
    <p id="blockedReason" class="text-sm text-gray-400 bg-white/5 rounded-2xl p-4 mt-3 leading-relaxed"></p>
  </div>
</div>

<!-- NOT TELEGRAM -->
<div id="tgWarn" class="hidden fixed inset-0 z-50 bg-bg flex items-center justify-center p-6">
  <div class="text-center">
    <div class="text-5xl mb-4">📱</div>
    <p class="font-black text-white text-lg mb-2">Telegram orqali oching</p>
    <p class="text-sm text-gray-500">Bu ilova faqat Telegram ichida ishlaydi</p>
  </div>
</div>

<!-- HEADER -->
<header class="sticky top-0 z-30 bg-bg/95 backdrop-blur-md border-b border-white/5">
  <div class="flex items-center justify-between px-4 py-3">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-xl bg-accent flex items-center justify-center font-black text-white text-sm">R</div>
      <span id="headerTitle" class="font-black text-white text-sm tracking-tight">Restoran</span>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="openProfile()" class="press w-9 h-9 rounded-xl bg-bg3 flex items-center justify-center">
        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      </button>
      <button onclick="toggleCart()" class="press relative w-9 h-9 rounded-xl bg-accent flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.3 2.3c-.63.63-.18 1.7.7 1.7H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        <span id="cartBadge" class="hidden absolute -top-1 -right-1 w-4 h-4 bg-white text-accent text-xs font-black rounded-full flex items-center justify-center">0</span>
      </button>
    </div>
  </div>
  <!-- Category tabs -->
  <div id="catTabs" class="flex gap-2 px-4 pb-3 overflow-x-auto scrollbar-hide">
    <button class="tab-active shrink-0 px-4 py-1.5 rounded-full text-xs font-bold bg-bg3 text-gray-400" onclick="filterCat('all',this)">🍽 Barchasi</button>
  </div>
</header>

<!-- MAIN -->
<main class="pb-28">
  <!-- Order type -->
  <div class="px-4 pt-4 pb-2 flex gap-2">
    <button id="btnOnline" onclick="setType('online')" class="press flex-1 py-3 rounded-2xl text-xs font-black border border-white/10 bg-bg3 text-gray-400 transition-all">🛵 Yetkazib berish</button>
    <button id="btnDine"   onclick="setType('dine_in')" class="press flex-1 py-3 rounded-2xl text-xs font-black border border-white/10 bg-bg3 text-gray-400 transition-all">🍽 Restoran ichida</button>
  </div>
  <div id="tableWrap" class="hidden px-4 pb-3">
    <input id="tableNum" type="number" min="1" placeholder="Stol raqami..." class="w-full bg-bg3 border border-white/10 rounded-2xl px-4 py-3 text-sm text-white placeholder-gray-500 outline-none focus:border-accent transition-colors"/>
  </div>

  <!-- Products grid -->
  <div id="grid" class="px-4 pt-1 grid grid-cols-2 gap-3">
    <div class="animate-pulse bg-bg3 rounded-2xl h-52"></div>
    <div class="animate-pulse bg-bg3 rounded-2xl h-52"></div>
    <div class="animate-pulse bg-bg3 rounded-2xl h-52"></div>
    <div class="animate-pulse bg-bg3 rounded-2xl h-52"></div>
  </div>
</main>

<!-- CART SHEET -->
<div id="cartSheet" class="hidden fixed inset-0 z-40">
  <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="toggleCart()"></div>
  <div class="slide-up absolute bottom-0 inset-x-0 bg-bg2 rounded-t-3xl max-h-[88vh] flex flex-col">
    <div class="flex items-center justify-between px-5 pt-5 pb-4 border-b border-white/5">
      <h2 class="font-black text-lg text-white">🛒 Savat</h2>
      <button onclick="toggleCart()" class="press w-8 h-8 bg-bg3 rounded-xl flex items-center justify-center text-gray-400 font-bold">✕</button>
    </div>
    <div id="cartItems" class="flex-1 overflow-y-auto px-5 py-3 space-y-2"></div>
    <div class="px-5 py-4 border-t border-white/5">
      <div class="flex justify-between mb-3">
        <span class="text-sm text-gray-400 font-semibold">Jami summa:</span>
        <span id="cartTotal" class="font-black text-accent text-base">0 so'm</span>
      </div>
      <button onclick="placeOrder(this)" class="press w-full py-4 bg-accent rounded-2xl text-white font-black text-sm hover:bg-orange-500 transition-colors">Buyurtma berish →</button>
    </div>
  </div>
</div>

<!-- PROFILE SHEET -->
<div id="profileSheet" class="hidden fixed inset-0 z-40">
  <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeProfile()"></div>
  <div class="slide-up absolute bottom-0 inset-x-0 bg-bg2 rounded-t-3xl max-h-[85vh] flex flex-col">
    <div class="flex items-center justify-between px-5 pt-5 pb-4">
      <h2 class="font-black text-lg text-white">👤 Profil</h2>
      <button onclick="closeProfile()" class="press w-8 h-8 bg-bg3 rounded-xl flex items-center justify-center text-gray-400 font-bold">✕</button>
    </div>
    <div class="px-5 pb-4 space-y-3 overflow-y-auto">
      <div class="bg-bg3 rounded-2xl p-4 flex items-center gap-3">
        <div class="w-12 h-12 bg-accent/20 rounded-2xl flex items-center justify-center text-2xl">👤</div>
        <div>
          <div id="pName" class="font-black text-white text-base">—</div>
          <div id="pPhone" class="text-xs text-gray-400 mt-0.5">—</div>
        </div>
      </div>
      <button onclick="loadOrders()" class="press w-full py-3.5 bg-bg3 rounded-2xl text-sm font-bold text-white flex items-center justify-between px-4">
        <span>📋 Buyurtmalarim</span>
        <span class="text-gray-400">→</span>
      </button>
      <div id="ordersList" class="space-y-2"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toasts" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

<script src="app.js"></script>
</body>
</html>
