<!-- 
  index.html dagi userPanel ichiga shu qismni qo'ying.
  Mavjud userPanel div ichidagi kontentni shu bilan almashtiring.

<!-- User Panel -->
<div id="userPanel"
     class="fixed top-0 right-0 h-full w-80 bg-[#0f172a] z-50 transform translate-x-full transition-transform duration-300 overflow-y-auto">

  <div class="p-6">

    <!-- Yopish tugmasi -->
    <button onclick="closePanels()" class="text-gray-400 hover:text-white mb-6">✕ Yopish</button>

    <!-- Profil ma'lumotlari -->
    <div class="bg-[#1e293b] rounded-xl p-5 mb-6">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-12 h-12 bg-emerald-600 rounded-full flex items-center justify-center text-xl font-bold">
          👤
        </div>
        <div>
          <h3 id="profileName" class="font-bold text-lg">Yuklanmoqda...</h3>
          <p id="profileUsername" class="text-gray-400 text-sm"></p>
        </div>
      </div>
      <p id="profilePhone" class="text-gray-300 text-sm"></p>
    </div>

    <!-- Buyurtmalar ro'yxati -->
    <h3 class="font-bold text-lg mb-3">📋 Buyurtmalarim</h3>
    <div id="userOrders">
      <div class="text-gray-400 text-center py-6">Yuklanmoqda...</div>
    </div>

  </div>
</div>
