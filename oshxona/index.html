<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ServiX — Oshxona</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #242833;
    --accent: #f59e0b;
    --accent2: #d97706;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --orange: #f97316;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --text3: #64748b;
    --border: #2d3348;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
  
  /* === LOGIN === */
  .login-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .login-box { background:var(--bg2); border-radius:var(--radius); padding:40px 30px; width:100%; max-width:380px; text-align:center; border:1px solid var(--border); }
  .login-box h1 { font-size:28px; margin-bottom:6px; }
  .login-box h1 span { color:var(--accent); }
  .login-box p { color:var(--text2); margin-bottom:28px; font-size:14px; }
  .login-box input { width:100%; padding:14px 16px; border:1px solid var(--border); border-radius:10px; background:var(--bg3); color:var(--text); font-size:15px; margin-bottom:12px; outline:none; transition:border .2s; }
  .login-box input:focus { border-color:var(--accent); }
  .login-box button { width:100%; padding:14px; background:var(--accent); color:#000; font-size:16px; font-weight:700; border:none; border-radius:10px; cursor:pointer; transition:background .2s; }
  .login-box button:hover { background:var(--accent2); }
  .login-err { color:var(--red); font-size:13px; margin-top:8px; display:none; }

  /* === MAIN LAYOUT === */
  .app { display:none; }
  .topbar { background:var(--bg2); padding:14px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
  .topbar-left { display:flex; align-items:center; gap:10px; }
  .topbar h2 { font-size:18px; font-weight:700; }
  .topbar h2 span { color:var(--orange); }
  .topbar-right { display:flex; align-items:center; gap:8px; }
  .topbar-name { font-size:13px; color:var(--text2); }
  .btn-icon { background:none; border:none; color:var(--text2); font-size:20px; cursor:pointer; padding:6px; border-radius:8px; transition:all .2s; }
  .btn-icon:hover { background:var(--bg3); color:var(--text); }
  .conn-status { display:flex; align-items:center; gap:4px; font-size:11px; }
  .conn-dot { width:8px; height:8px; border-radius:50%; }
  .conn-dot.on { background:var(--green); }
  .conn-dot.off { background:var(--red); }

  /* === COLUMNS === */
  .kitchen-layout { padding:12px; display:flex; flex-direction:column; gap:16px; max-width:800px; margin:0 auto; }
  
  .column { background:var(--bg2); border-radius:var(--radius); border:1px solid var(--border); overflow:hidden; }
  .column-header { padding:14px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); cursor:pointer; }
  .column-header h3 { font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .column-count { font-size:12px; font-weight:700; padding:2px 8px; border-radius:10px; }
  .col-new .column-count { background:rgba(239,68,68,.15); color:var(--red); }
  .col-cooking .column-count { background:rgba(249,115,22,.15); color:var(--orange); }
  .col-ready .column-count { background:rgba(34,197,94,.15); color:var(--green); }
  .column-body { padding:8px; }
  .column-body.collapsed { display:none; }

  /* === ORDER CARD === */
  .order-card { background:var(--bg3); border-radius:12px; padding:14px; margin-bottom:8px; border-left:4px solid transparent; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .order-card.new { border-left-color:var(--red); }
  .order-card.cooking { border-left-color:var(--orange); }
  .order-card.ready { border-left-color:var(--green); }
  .order-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .order-table { font-size:18px; font-weight:800; }
  .order-time { font-size:12px; color:var(--text3); }
  .order-waiter { font-size:12px; color:var(--text2); margin-bottom:8px; }
  .order-items { margin-bottom:12px; }
  .order-item { display:flex; justify-content:space-between; align-items:center; padding:6px 0; font-size:14px; }
  .order-item-name { font-weight:600; }
  .order-item-qty { color:var(--text2); font-size:13px; }
  
  .btn { padding:10px 16px; border-radius:10px; font-size:13px; font-weight:600; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:all .2s; width:100%; justify-content:center; }
  .btn:active { transform:scale(0.96); }
  .btn-cook { background:rgba(249,115,22,.15); color:var(--orange); }
  .btn-cook:hover { background:rgba(249,115,22,.25); }
  .btn-ready { background:rgba(34,197,94,.15); color:var(--green); }
  .btn-ready:hover { background:rgba(34,197,94,.25); }
  
  .empty-state { text-align:center; padding:30px 20px; color:var(--text3); font-size:14px; }

  /* === NOTIFICATION SOUND === */
  .toast { position:fixed; top:70px; right:16px; background:var(--bg2); border:1px solid var(--orange); border-radius:12px; padding:14px 18px; z-index:300; max-width:320px; animation:toastIn .3s ease; box-shadow:var(--shadow); }
  @keyframes toastIn { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  .toast-title { font-weight:700; font-size:14px; margin-bottom:2px; }
  .toast-msg { font-size:13px; color:var(--text2); }

  /* === PULSE ANIMATION === */
  .pulse { animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-wrap">
  <div class="login-box">
    <h1>Servi<span>X</span></h1>
    <p>🍳 Oshxona paneli</p>
    <input type="text" id="loginUser" placeholder="Login" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Parol" autocomplete="current-password">
    <button onclick="doLogin()" id="loginBtn">Kirish</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <h2>🍳 Osh<span>xona</span></h2>
      <div class="conn-status">
        <div class="conn-dot" id="connDot"></div>
        <span id="connText">...</span>
      </div>
    </div>
    <div class="topbar-right">
      <span class="topbar-name" id="chefName"></span>
      <button class="btn-icon" onclick="doLogout()" title="Chiqish">⏻</button>
    </div>
  </div>

  <!-- KITCHEN COLUMNS -->
  <div class="kitchen-layout">
    <!-- YANGI -->
    <div class="column col-new">
      <div class="column-header" onclick="toggleColumn('new')">
        <h3>🆕 YANGI <span class="column-count" id="countNew">0</span></h3>
        <span id="arrowNew">▼</span>
      </div>
      <div class="column-body" id="colNew"></div>
    </div>

    <!-- TAYYORLANMOQDA -->
    <div class="column col-cooking">
      <div class="column-header" onclick="toggleColumn('cooking')">
        <h3>🍳 TAYYORLANMOQDA <span class="column-count" id="countCooking">0</span></h3>
        <span id="arrowCooking">▼</span>
      </div>
      <div class="column-body" id="colCooking"></div>
    </div>

    <!-- TAYYOR -->
    <div class="column col-ready">
      <div class="column-header" onclick="toggleColumn('ready')">
        <h3>✅ TAYYOR <span class="column-count" id="countReady">0</span></h3>
        <span id="arrowReady">▼</span>
      </div>
      <div class="column-body" id="colReady"></div>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script src="app.js"></script>
</body>
</html>
