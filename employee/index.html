<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Ishchi Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        bg:     '#0a0e17',
        bg2:    '#111827',
        bg3:    '#1a2235',
        card:   '#131c2e',
        accent: '#10b981',
        gold:   '#f59e0b',
        danger: '#ef4444',
      },
      fontFamily: { sans: ['Nunito','sans-serif'] }
    }
  }
}
</script>
<script>
window.__CONFIG__ = {
  API_URL: "https://e-comerce-bot-main-production.up.railway.app"
};
</script>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:#0a0e17;color:#e5e9f0;font-family:'Nunito',sans-serif;overscroll-behavior:none}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
  @keyframes toastIn{from{transform:translateX(110%)}to{transform:translateX(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .fade-in{animation:fadeIn .25s ease}
  .modal-in{animation:modalIn .2s ease}
  .press:active{transform:scale(.95);transition:transform .1s}
  .spinner{animation:spin 1s linear infinite;border:3px solid rgba(16,185,129,.2);border-top-color:#10b981;border-radius:50%;width:28px;height:28px}
  input,select{background:#1a2235;border:1px solid rgba(255,255,255,.08);color:#e5e9f0;border-radius:.75rem;padding:.625rem .875rem;outline:none;width:100%;font-family:'Nunito',sans-serif;font-size:.875rem;transition:border-color .2s}
  input:focus{border-color:#10b981}
  input::placeholder{color:#4b5563}
</style>
</head>
<body class="min-h-screen">

<!-- BLOCKED -->
<div id="blockedScreen" class="hidden fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-6">
  <div class="text-center max-w-xs">
    <div class="text-6xl mb-4">🔒</div>
    <p class="text-xl font-black text-white mb-2">Tizim bloklangan</p>
    <p id="blockedReason" class="text-sm text-gray-400 bg-white/5 rounded-2xl p-4 leading-relaxed"></p>
  </div>
</div>

<!-- LOGIN PAGE -->
<div id="loginPage" class="fixed inset-0 z-40 bg-bg flex items-center justify-center p-6">
  <div class="w-full max-w-xs modal-in text-center">
    <div class="w-16 h-16 bg-accent/20 rounded-3xl flex items-center justify-center text-4xl mx-auto mb-6">👷</div>
    <h1 class="text-2xl font-black text-white mb-1">Ishchi Panel</h1>
    <p class="text-gray-500 text-sm mb-8">Tizimga kiring</p>
    <div class="space-y-3">
      <input id="empUser" type="text" placeholder="Login" class="text-center font-bold"/>
      <input id="empPass" type="password" placeholder="Parol" class="text-center font-bold" onkeydown="if(event.key==='Enter')doLogin()"/>
      <p id="loginErr" class="hidden text-red-400 text-xs font-bold"></p>
      <button onclick="doLogin()" class="press w-full py-4 bg-accent rounded-2xl text-white font-black text-sm hover:bg-emerald-600 transition-colors">Kirish →</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden min-h-screen pb-24">

  <!-- Header -->
  <header class="sticky top-0 z-20 bg-bg2/95 backdrop-blur border-b border-white/5 px-4 py-3 flex items-center justify-between">
    <div>
      <p id="empNameHeader" class="font-black text-white text-sm">Ishchi</p>
      <p id="empPosHeader"  class="text-xs text-gray-500">Lavozim</p>
    </div>
    <div class="flex items-center gap-2">
      <div id="headerTime" class="text-xs font-bold text-gray-400 bg-bg3 px-2 py-1 rounded-lg"></div>
      <button onclick="logout()" class="w-8 h-8 bg-red-500/20 rounded-xl flex items-center justify-center text-red-400 text-xs font-bold">↩</button>
    </div>
  </header>

  <!-- CHECK-IN / CHECK-OUT CARD -->
  <div class="px-4 pt-5">
    <div id="todayCard" class="bg-card rounded-3xl p-5 border border-white/5 mb-4 fade-in">
      <div class="flex items-center justify-between mb-4">
        <p class="font-black text-white text-base">Bugungi davomat</p>
        <span id="todayDate" class="text-xs text-gray-500 bg-bg3 px-2 py-1 rounded-lg"></span>
      </div>

      <!-- Status row -->
      <div class="flex gap-3 mb-5">
        <div class="flex-1 bg-bg3 rounded-2xl p-3 text-center">
          <p class="text-xs text-gray-500 mb-1">Keldi</p>
          <p id="checkInTime" class="font-black text-white text-lg">—</p>
        </div>
        <div class="flex-1 bg-bg3 rounded-2xl p-3 text-center">
          <p class="text-xs text-gray-500 mb-1">Ketdi</p>
          <p id="checkOutTime" class="font-black text-white text-lg">—</p>
        </div>
        <div class="flex-1 bg-bg3 rounded-2xl p-3 text-center">
          <p class="text-xs text-gray-500 mb-1">Ishlagan</p>
          <p id="workedTime" class="font-black text-accent text-lg">—</p>
        </div>
      </div>

      <!-- Late badge -->
      <div id="lateBadge" class="hidden bg-yellow-500/10 border border-yellow-500/20 rounded-xl px-3 py-2 text-center mb-4">
        <p class="text-xs font-bold text-yellow-400">⚠️ Kechikish: <span id="lateMin">0</span> daqiqa</p>
      </div>

      <!-- Face camera -->
      <div id="cameraWrap" class="hidden mb-4">
        <div class="relative rounded-2xl overflow-hidden border border-white/10 bg-black">
          <video id="camVideo" autoplay playsinline class="w-full h-52 object-cover"></video>
          <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="w-40 h-40 rounded-full border-2 border-accent/60 border-dashed"></div>
          </div>
          <button onclick="closeCam()" class="absolute top-3 right-3 w-8 h-8 bg-black/60 rounded-xl flex items-center justify-center text-white text-sm font-bold">✕</button>
        </div>
        <canvas id="camCanvas" class="hidden"></canvas>
      </div>

      <!-- Action buttons -->
      <div id="actionBtns" class="space-y-2">
        <div class="flex justify-center"><div class="spinner hidden" id="loadingSpinner"></div></div>
      </div>
    </div>

    <!-- Stats cards -->
    <div class="grid grid-cols-3 gap-2 mb-4">
      <div class="bg-card rounded-2xl p-3 border border-white/5 text-center">
        <p id="monthWorked" class="font-black text-white text-xl">—</p>
        <p class="text-xs text-gray-500 mt-0.5">Keldi (oy)</p>
      </div>
      <div class="bg-card rounded-2xl p-3 border border-white/5 text-center">
        <p id="monthSalary" class="font-black text-accent text-xl">—</p>
        <p class="text-xs text-gray-500 mt-0.5">Maosh</p>
      </div>
      <div class="bg-card rounded-2xl p-3 border border-white/5 text-center">
        <p id="monthAbsent" class="font-black text-red-400 text-xl">—</p>
        <p class="text-xs text-gray-500 mt-0.5">Kelmadi</p>
      </div>
    </div>

    <!-- Last 7 days -->
    <div class="bg-card rounded-3xl p-4 border border-white/5">
      <p class="font-black text-white text-sm mb-3">Oxirgi 7 kun</p>
      <div id="last7" class="flex gap-2 overflow-x-auto pb-1"></div>
    </div>
  </div>

</div><!-- end app -->

<!-- Toast -->
<div id="empToasts" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

<script src="app.js"></script>
</body>
</html>
